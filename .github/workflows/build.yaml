name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: kivy/buildozer-action@v2
      with:
        python-version: '3.9'
        requirements: 'python3,kivy,kivy-deps.sdl2,kivy-deps.gstreamer'
        buildozer-command: |
          sed -i 's/package.domain = org.test/package.domain = com.neon.militia/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = NeonMilitia/' buildozer.spec
          sed -i 's/main.py/main_v9.py/' buildozer.spec
          buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: NeonMilitia-APK
        path: bin/*.apk
